spring.application.name=spring_boot_payment
server.port=8081

# H2 in-memory DB (mock)
spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (gateway와 동일한 시크릿으로 토큰 검증)
jwt.secret=${JWT_SECRET}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:192.168.0.10:9092}
# Kafka가 준비되지 않아도 서비스가 기동되도록 설정 (재연결은 백그라운드에서 자동 수행)
spring.kafka.admin.fail-fast=false
spring.kafka.listener.missing-topics-fatal=false

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
