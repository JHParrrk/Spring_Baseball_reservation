# MariaDB
spring.datasource.url=jdbc:mariadb://${INFRA_HOST}:${DB_PORT}/${DB_DATABASE}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# HikariCP 커넥션 풀 설정
# 고트래픽 환경에서 HikariCP 기본값(10)은 부족할 수 있음
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Redis
spring.data.redis.host=${INFRA_HOST}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# RabbitMQ
spring.rabbitmq.host=${INFRA_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Kafka
spring.kafka.bootstrap-servers=${INFRA_HOST}:9092
# Kafka가 준비되지 않아도 서비스가 기동되도록 설정
spring.kafka.admin.fail-fast=false
spring.kafka.listener.missing-topics-fatal=false

server.port=8080

# 인프라 테스트 컨트롤러/서비스 활성화 (dev 환경에서만 사용)
# 프로덕션에서는 이 설정을 제거하거나 false로 설정하세요
app.infra-test.enabled=true
