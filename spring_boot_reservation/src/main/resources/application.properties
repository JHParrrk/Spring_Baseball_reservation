spring.application.name=spring_boot_reservation
spring.profiles.active=dev

# JWT Settings
jwt.secret=${JWT_SECRET}
# Access Token 만료 시간: 1시간 (3600000ms)
jwt.expiration-ms=3600000

# CORS Settings
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 내부 서비스 통신 시크릿 (gateway와 동일 값이어야 합니다)
internal.secret=${INTERNAL_SECRET:internal-secret-key}

# Google OAuth2 설정은 게이트웨이로 이관되었습니다.
# 참고: baseball_reservation_gateway/.env

# 경기 자동 예매 오픈 설정 (UPCOMING -> ON_SALE)
app.match.auto-open.days-before=7
app.match.auto-open.cron=0 */10 * * * *
app.match.auto-open.zone=Asia/Seoul
app.match.auto-open.log-retention=200
